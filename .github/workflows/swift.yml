name: iOS CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  swiftlint:
    name: SwiftLint
    # use Linux for the SwiftLint action since this GH library requires it (so bot can post inline to PR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: GitHub Action for SwiftLint
        uses: norio-nomura/action-swiftlint@3.2.1
        env:
          WORKING_DIRECTORY: .
  build:
    runs-on: macos-latest
    needs: swiftlint
    steps:
    - uses: actions/checkout@v4

    - name: Select appropriate Xcode
      run: sudo xcode-select -s /Applications/Xcode_16.2.app

    - name: List demo schemes
      run: xcodebuild -list -workspace DualCameraKit.xcworkspace

    - name: List Devices
      run: xcrun simctl list devices

    - name: Build demo for iOS simulator
      run: xcrun xcodebuild build -workspace DualCameraKit.xcworkspace -scheme DualCameraDemo -destination "generic/platform=iOS Simulator" -sdk iphonesimulator CODE_SIGNING_ALLOWED=NO

    - name: Run package tests on iOS simulator
      run: xcrun xcodebuild test -scheme DualCameraKitUI -destination "platform=iOS Simulator,name=iPhone 16,OS=18.2" -sdk iphonesimulator
